<html>
<body>
    <h1>登録確認</h1>

    <table border="1">
        <tr>
            <th>会員ID</th>
            <td>{{ data.user_id }}</td>
        </tr>
        <tr>
            <th>パスワード</th>
            <td>
                {% for i in data.password %}*{% endfor %}
            </td>
        </tr>
        <tr>
            <th>お名前</th>
            <td>{{ data.name }}</td>
        </tr>
        <tr>
            <th>ご住所</th>
            <td>{{ data.address }}</td>
        </tr>
    </table>

        <br>

        <form method="post" action="{% url 'user_register_commit' %}">
            {% csrf_token %}

            <input type="hidden" name="user_id" value="{{ data.user_id }}">
            <input type="hidden" name="password" value="{{ data.password }}">
            <input type="hidden" name="name" value="{{ data.name }}">
            <input type="hidden" name="address" value="{{ data.address }}">

            <button type="submit">登録</button>
        </form>

    </div>
    <br>
    <a href="{% url 'index' %}">商品検索へ</a>
</body>
</html>
