<html>
<body>
    <h1>以下の会員情報で更新しますか？</h1>

    <table border="1">
        <tr>
            <th>会員ID</th>
            <td>{{ data.user_id }}</td>
        </tr>
        <tr>
            <th>パスワード</th>
            <td>
                {% for i in data.password %}*{% endfor %}
            </td>
        </tr>
        <tr>
            <th>お名前</th>
            <td>{{ data.name }}</td>
        </tr>
        <tr>
            <th>ご住所</th>
            <td>{{ data.address }}</td>
        </tr>
    </table>

    <br>

    <form method="post" action="{% url 'user_update_commit' %}">
        {% csrf_token %}

        <input type="hidden" name="user_id" value="{{ data.user_id }}">
        <input type="hidden" name="password" value="{{ data.password }}">
        <input type="hidden" name="name" value="{{ data.name }}">
        <input type="hidden" name="address" value="{{ data.address }}">

        <button type="submit">変更</button>
    </form>

    <br>

    <a href="">商品検索へ</a>

</body>
</html>
